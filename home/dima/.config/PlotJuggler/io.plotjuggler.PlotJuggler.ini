FunctionEditorWidget.recentSnippetsXML="@ByteArray(<snippets>\n  <snippet name=\"average_two_curves\">\n    <global></global>\n    <function>return (value+v1)/2</function>\n    <linked_source></linked_source>\n  </snippet>\n  <snippet name=\"backward_difference_derivative\">\n    <global>prevX = 0\nprevY = 0\nis_first = true</global>\n    <function>if (is_first) then\n  is_first = false\n  prevX = time\n  prevY = value\nend\n\ndx = time - prevX\ndy = value - prevY\nprevX = time\nprevY = value\n\nreturn dy/dx</function>\n    <linked_source></linked_source>\n  </snippet>\n  <snippet name=\"central_difference_derivative\">\n    <global>firstX = 0\nfirstY = 0\nis_first = true\nsecondX = 0\nsecondY = 0\nis_second = false</global>\n    <function>-- Wait for initial values\nif (is_first) then\n  is_first = false\n  is_second = true\n  firstX = time\n  firstY = value\nend\n\nif (is_second) then\n  is_second = false\n  secondX = time\n  secondY = value\nend\n\n-- Central derivative: dy/dx ~= f(x+delta_x)-f(x-delta_x)/(2*delta_x)\ndx = time - firstX\ndy = value - firstY\n-- Increment\nfirstX = secondX\nfirstY = secondY\nsecondX = time\nsecondY = value\n\nreturn dy/dx</function>\n    <linked_source></linked_source>\n  </snippet>\n  <snippet name=\"integral\">\n    <global>prevX = 0\nintegral = 0\nis_first = true</global>\n    <function>if (is_first) then\n  is_first = false\n  prevX = time\nend\n\ndx = time - prevX\nprevX = time\n\nintegral = integral + value*dx\n\nreturn integral</function>\n    <linked_source></linked_source>\n  </snippet>\n  <snippet name=\"quat_to_pitch\">\n    <global></global>\n    <function>w = value\nx = v1\ny = v2\nz = v3\n\ndcm20 = 2 * (x * z - w * y)\n\npitch = math.asin(-dcm20)\n\nreturn pitch</function>\n    <linked_source></linked_source>\n  </snippet>\n  <snippet name=\"quat_to_roll\">\n    <global></global>\n    <function>w = value\nx = v1\ny = v2\nz = v3\n\ndcm21 = 2 * (w * x + y * z)\ndcm22 = w*w - x*x - y*y + z*z\n\nroll = math.atan2(dcm21, dcm22)\n\nreturn roll</function>\n    <linked_source></linked_source>\n  </snippet>\n  <snippet name=\"quat_to_yaw\">\n    <global></global>\n    <function>w = value\nx = v1\ny = v2\nz = v3\n\ndcm10 = 2 * (x * y + w * z)\ndcm00 = w*w + x*x - y*y - z*z\n\nyaw = math.atan2(dcm10, dcm00)\n\nreturn yaw</function>\n    <linked_source></linked_source>\n  </snippet>\n  <snippet name=\"rad_to_deg\">\n    <global></global>\n    <function>return value*180/3.14159</function>\n    <linked_source></linked_source>\n  </snippet>\n  <snippet name=\"remove_offset\">\n    <global>is_first = true\nfirst_value = 0</global>\n    <function>if (is_first) then\n  is_first = false\n  first_value = value\nend\n\nreturn value - first_value</function>\n    <linked_source></linked_source>\n  </snippet>\n</snippets>\n)"
